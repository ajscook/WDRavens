function evaluateSynergies(activeSet, generators) {
  const ALL_IDS = ["bjorn","snik","ezmerelda","saeris","jack","betty","khorvax","kiron","huck","mobius"];
  const SHORT_TO_ID = {};
  ALL_IDS.forEach(id => { SHORT_TO_ID[CHARACTERS[id].short.toUpperCase()] = id; });
  const results = [];
  for (const gen of generators) {
    const result = gen(activeSet);
    if (result) {
      // Auto-detect which ravens are referenced in summary+detail
      const text = (result.summary + " " + result.detail).toUpperCase();
      const involved = ALL_IDS.filter(id => {
        const short = CHARACTERS[id].short.toUpperCase();
        return activeSet.has(id) && text.includes(short);
      });
      result.ravens = involved.length === activeSet.size ? "ALL" : involved;
      results.push(result);
    }
  }
  results.sort((a, b) => b.impact - a.impact);
  return results;
}

// COMPONENTS
function SynergyCard({ synergy, accentColor, expanded, onToggle }) {
  const ravenTags = synergy.ravens === "ALL" ? ["ALL"] : (synergy.ravens || []).map(id => CHARACTERS[id].short);
  return (
    <div style={{
      background: "#0d0d0d",
      border: `1px solid ${accentColor}33`,
      borderLeftWidth: "3px",
      borderBottomWidth: "3px",
      borderLeftColor: accentColor + "88",
      borderBottomColor: accentColor + "88",
      borderRadius: "6px",
      padding: "18px 20px",
      cursor: "pointer",
      transition: "border-color 0.15s, box-shadow 0.15s",
    }} onClick={onToggle}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "6px" }}>
        <div style={{ fontSize: "21px", fontWeight: 700, color: "#f0ece6", letterSpacing: "2px", textTransform: "uppercase" }}>
          {synergy.name}
        </div>
        <span style={{
          fontSize: "17px", color: "#6b7d8f", transform: expanded ? "rotate(90deg)" : "rotate(0deg)",
          transition: "transform 0.15s", flexShrink: 0, marginLeft: "12px", marginTop: "2px",
        }}>&#9654;</span>
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: "6px", marginBottom: "10px" }}>
        {ravenTags.map(tag => (
          <span key={tag} style={{
            fontSize: "11px",
            fontWeight: 700,
            fontFamily: FONT,
            letterSpacing: "1.5px",
            textTransform: "uppercase",
            color: accentColor,
            background: accentColor + "18",
            border: `1px solid ${accentColor}44`,
            borderRadius: "4px",
            padding: "2px 8px",
          }}>{tag}</span>
        ))}
      </div>
      <div style={{ fontSize: "17px", lineHeight: "1.75", color: "#e2e8f0" }}>
        {synergy.summary}
      </div>
      {expanded && (
        <div style={{
          marginTop: "16px",
          paddingTop: "16px",
          borderTop: "1px solid #2a2a2a",
          fontSize: "16px",
          lineHeight: "1.85",
          color: "#d0dae4",
        }}>
          {synergy.detail.split("\n\n").map((para, i) => {
            const trimmed = para.trim();
            if (!trimmed) return null;
            const isHeader = trimmed === trimmed.toUpperCase() && trimmed.length < 80 && !trimmed.includes(":");
            const isSubHeader = /^[A-Z][A-Z\s&+\/]+:/.test(trimmed);
            const isBullet = trimmed.startsWith("- ");
            if (isHeader) return (
              <div key={i} style={{ fontSize: "15px", fontWeight: 700, color: "#b0c4d8", letterSpacing: "2px", marginTop: i > 0 ? "20px" : "4px", marginBottom: "8px" }}>
                {trimmed}
              </div>
            );
            if (isBullet) return (
              <div key={i} style={{ paddingLeft: "16px", marginBottom: "6px", color: "#d0dae4" }}>
                {trimmed}
              </div>
            );
            if (isSubHeader) {
              const colonIdx = trimmed.indexOf(":");
              return (
                <div key={i} style={{ marginBottom: "10px", marginTop: i > 0 ? "14px" : "0" }}>
                  <span style={{ fontWeight: 700, color: "#f0ece6" }}>{trimmed.slice(0, colonIdx + 1)}</span>
                  <span style={{ color: "#7a8a9a" }}>{trimmed.slice(colonIdx + 1)}</span>
                </div>
              );
            }
            return (
              <div key={i} style={{ marginBottom: "10px" }}>
                {trimmed}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function CharacterSection({ title, desc, content, defaultOpen = false }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div style={styles.section}>
      <div style={styles.sectionHeader} onClick={() => setOpen(!open)}>

      </div>
      {open && (
        <div style={styles.sectionContent}>
          {content.split("\n").map((line, i) => {
            const trimmed = line.trim();
            if (!trimmed) return <br key={i} />;
            const parts = trimmed.split(/(\*\*[^*]+\*\*)/g);
            return (
              <div key={i} style={{ marginBottom: "4px" }}>
                {parts.map((part, j) => {
                  if (part.startsWith("**") && part.endsWith("**")) {

function RosterButton({ id, active, onToggle, isTopRow }) {

const ROSTER_COLUMNS = [
  ["bjorn", "snik"],
  ["ezmerelda", "saeris"],
  ["jack", "mobius"],

function PartyView() {
  const [activeRoster, setActiveRoster] = useState(new Set());
  const [category, setCategory] = useState("combat");
  const CATEGORIES = [
    { id: "combat", label: "Combat" },
    { id: "stealth", label: "Stealth" },
    { id: "social", label: "Social" },
    { id: "meta", label: "Meta" },
  ];
  const GENERATOR_MAP = {
    combat: SYNERGY_GENERATORS,
    stealth: STEALTH_GENERATORS,
    social: SOCIAL_GENERATORS,
    meta: META_GENERATORS,
  };
  const toggleChar = (id) => {
    setActiveRoster(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
    setOpenSynergy(null);
  };
  const synergies = useMemo(() => evaluateSynergies(activeRoster, GENERATOR_MAP[category]), [activeRoster, category]);
  const [openSynergy, setOpenSynergy] = useState(null);
  const CATEGORY_COLORS = { combat: "#d97a3e", stealth: "#a78bfa", social: "#d4577a", meta: "#4a9eed" };
  return (
    <>
      <div style={styles.rosterBar}>
        <div style={styles.rosterGrid}>
          {ROSTER_COLUMNS.flatMap((col, colIdx) => {
            const items = [
              <div key={`col-${colIdx}`} style={styles.rosterColumn}>
                <RosterButton id={col[0]} active={activeRoster.has(col[0])} onToggle={toggleChar} isTopRow={true} />
                <RosterButton id={col[1]} active={activeRoster.has(col[1])} onToggle={toggleChar} isTopRow={false} />
              </div>
            ];
            if (colIdx < ROSTER_COLUMNS.length - 1) {
              items.push(<div key={`div-${colIdx}`} style={styles.rosterDivider} />);
            }
            return items;
          })}
        </div>
      </div>
      {/* Category Tabs */}
      {activeRoster.size > 0 && (
        <div style={{ display: "flex", justifyContent: "center", gap: "6px", padding: "8px 20px 12px", borderBottom: "1px solid #1a1a1a" }}>
          {CATEGORIES.map(cat => {
            const active = category === cat.id;
            const col = CATEGORY_COLORS[cat.id];
            return (
              <button
                key={cat.id}
                onClick={() => { setCategory(cat.id); setOpenSynergy(null); }}
                style={{
                  padding: "7px 20px",
                  background: active ? "#1a1a1a" : "transparent",
                  color: active ? col : "#6b7d8f",
                  border: active ? `1px solid ${col}44` : "1px solid transparent",
                  borderRadius: "6px",
                  cursor: "pointer",
                  fontSize: "15px",
                  fontWeight: 600,
                  fontFamily: FONT,
                  letterSpacing: "1px",
                  textTransform: "uppercase",
                  transition: "all 0.15s",
                }}
              >
                {cat.label}
              </button>
            );
          })}
        </div>
      )}
      {activeRoster.size === 0 && (
        <div style={{ position: "relative", display: "flex", alignItems: "center", justifyContent: "center", minHeight: "50vh", padding: "40px 20px", overflow: "hidden" }}>
          <img src="/assets/raven.png" alt="" style={{ position: "absolute", width: "840px", opacity: 1, userSelect: "none", pointerEvents: "none", zIndex: 0 }} />
          <div style={{ textAlign: "center", fontFamily: FONT, position: "relative", zIndex: 1 }}>
            <div style={{ fontSize: "32px", fontWeight: 700, color: "#ffffff", letterSpacing: "3px", textTransform: "uppercase", textShadow: "0 0 20px rgba(255,255,255,0.5), 0 0 40px rgba(255,255,255,0.2)" }}>
              Gather the Conspiracy
            </div>
            <div style={{ fontSize: "17px", color: "#888888", marginTop: "10px", letterSpacing: "1px", textShadow: "0 0 12px rgba(255,255,255,0.15)" }}>
              Toggle Ravens to see what they unlock together
            </div>
          </div>
        </div>
      )}
      {activeRoster.size > 0 && synergies.length === 0 && (
        <div style={{ textAlign: "center", padding: "60px 20px", color: "#6b7d8f", fontSize: "17px", letterSpacing: "1px", fontFamily: FONT }}>
          No cross-character synergies with this selection. Add more Ravens.
        </div>
      )}
      {synergies.length > 0 && (() => {
          const expanded = openSynergy !== null ? synergies.find(s => s.name === openSynergy) : null;
          const collapsed = expanded ? synergies.filter(s => s.name !== openSynergy) : synergies;
          const col = CATEGORY_COLORS[category];
          return (
            <div style={{ padding: "16px 20px 40px", maxWidth: "1200px", margin: "0 auto" }}>
              {expanded && (
                <div style={{ marginBottom: "14px" }}>
                  <SynergyCard
                    key={expanded.name}
                    synergy={expanded}
                    accentColor={col}
                    expanded={true}
                    onToggle={() => setOpenSynergy(null)}
                  />
                </div>
              )}
              <div style={{
                display: "grid",
                gridTemplateColumns: "1fr 1fr",
                gap: "14px",
              }}>
                {collapsed.map(s => (
                  <SynergyCard
                    key={s.name}
                    synergy={s}
                    accentColor={col}
                    expanded={false}
                    onToggle={() => setOpenSynergy(openSynergy === s.name ? null : s.name)}
                  />
                ))}
              </div>
            </div>
          );
        })()}
    </>
  );
}

Rakish Audacity provides a third path: Sneak Attack in 1v1 without Advantage or allies. Between these three triggers, Betty should land Sneak Attack on nearly every turn. If Faerie Fire is running, Advantage is guaranteed. If allies are adjacent, the condition is met. If neither, isolate the target.

    { title: "Cunning Action", desc: "Bonus Action to Dash, Disengage, or Hide",
      content: `As a Bonus Action, you can Dash (double your movement), Disengage (no Opportunity Attacks from anyone), or Hide (attempt a Stealth check to become Hidden). This is the standard Rogue toolkit for mobility and survival.

For Betty, Fancy Footwork handles most Disengage situations, so Cunning Action is usually Dash (close distance quickly or extend the retreat) or Hide (gain Advantage on the next attack from Hidden). However, Fancy Footwork only protects against creatures you attacked -- if you need to move past enemies you didn't attack, Disengage is still the answer.

Betty's Bonus Action is contested: Cunning Action competes with off-hand dagger attacks, Healing Word, and Misty Step. Knowing which Bonus Action to use on a given turn is one of the key decision points for playing Betty well.` },
    { title: "Fey Touched", desc: "Free Dissonant Whispers + Misty Step, once each per Long Rest",
      content: `One free casting each of Dissonant Whispers and Misty Step per Long Rest, no spell slots required. Both can also be cast using spell slots if you have them.

Dissonant Whispers (3d6 psychic, Wisdom save or the target panics and flees): the forced movement provokes Opportunity Attacks from every ally adjacent to the fleeing path. One spell can generate 2-3 free hits from the frontline. Even on a successful save, it deals half damage.

Misty Step (30-foot teleport as a Bonus Action): emergency escape or aggressive repositioning. Through walls, over gaps, out of grapples. One free use per Long Rest means this is always in your pocket for the moment that needs it.

These free casts are a significant part of Betty's power budget. They're not cantrips -- they're real spells that would otherwise cost slots. The free casts ensure Betty always has these tools available regardless of how the day's resources have been spent.` },
    { title: "Expertise", desc: "Stealth +11, Perception +7",
      content: `Expertise doubles the proficiency bonus on selected skills. Stealth +11 (Dexterity +5, doubled proficiency +6) is the highest Stealth in the party. Passive Stealth 21 means casual observers never notice Betty without making an active check.

Perception +7 (Wisdom +3, doubled proficiency +4) gives Passive Perception 17. Betty catches things others miss -- hidden doors, concealed weapons, the nervous twitch of someone about to draw. In a city of deception and hidden agendas, high Perception is survival.

Despite lacking darkvision, Betty's sensory toolkit is among the best in the party. She relies on sound, movement patterns, and instinct rather than seeing in the dark. Huck's Goggles of Night (Replicate Magic Item) solve the darkvision gap when needed.` },
    { title: "Darkvision", desc: "None -- Betty is one of the few Ravens without it",
      content: `Betty does not have darkvision. In darkness, she is effectively blind -- Disadvantage on attacks and Perception checks, and enemies have Advantage against her. Most of the party (Saeris, Ezmerelda, Kiron, Bjorn, Huck, Khorvax) can see in the dark. Betty, Jack, Snik, and Mobius cannot.

This matters in Waterdeep's underground spaces, nighttime operations, and any environment without light sources. It's not a flaw to fix -- it's a planning consideration. Huck's Goggles of Night (daily Replicate Magic Item) can grant darkvision to one character. Faerie Fire and light sources are other solutions.

The party should be aware of which characters can and can't see in any given situation. Sending Betty into a dark room alone is a bad plan. Sending Betty into a dark room with Goggles of Night equipped is a completely different situation.` },
  ],
  jack: [
    { title: "Blade Flourish", desc: "Free +1d6 damage + effect on every melee hit (no resource cost)",
      content: `Whenever you hit with a melee weapon attack, you can choose one of several Flourish effects. This is free and unlimited -- it does NOT cost Bardic Inspiration. The most common choice is Defensive Flourish: add 1d6 to the damage roll AND increase your AC by the same amount until the start of your next turn.

With base AC 17, Defensive Flourish regularly pushes Jack to AC 20-21. This makes Jack one of the most durable melee fighters in the party while also boosting damage output. There is no reason not to use Defensive Flourish on every hit unless another Flourish serves the moment better.

Other options: Juggling Flourish (hit a second target within 20 feet), Mobile Flourish (push the target and close distance without Opportunity Attacks). Each Flourish adds +1d6 to the primary hit, so the base damage boost is always present.` },
    { title: "Bardic Inspiration (1d6)", desc: "Give ally a safety net die, 4 per Long Rest, Bonus Action, 60 feet",
      content: `As a Bonus Action, choose one creature within 60 feet. They receive a 1d6 Bardic Inspiration die that lasts for 10 minutes. At any point during that window, when they fail an attack roll, saving throw, or ability check, they can add the die to the result to potentially turn the failure into a success.

Four uses per Long Rest is generous. The die only gets consumed when the ally uses it, and they choose when. Load this on the character facing the hardest challenge: Bjorn before a dangerous Wisdom save, Snik before a critical Stealth check, Kiron before a concentration-breaking hit.

Do not hoard Inspiration dice. An unused die at the end of the day is a wasted resource. Give them out early and often. The ally holds them for 10 minutes -- that's plenty of time for the right moment to arrive.` },
    { title: "Jack of All Trades", desc: "+1 to every non-proficient ability check, including Initiative",
      content: `Add half your proficiency bonus (rounded down, currently +1) to every ability check that doesn't already include your proficiency bonus. This includes Initiative (it's a Dexterity check). You're never completely useless at anything.

The +1 sounds small, but it applies to everything. Arcana checks when Kiron isn't available. Athletics checks when you need to climb. Medicine checks when the healers are busy. In a party of specialists, Jack is the generalist who can fill any gap in a pinch.

At higher levels this bonus grows. It also applies to Counterspell and Dispel Magic ability checks, making Jack unusually effective at countering enemy magic for a martial-leaning character.` },
    { title: "Expertise", desc: "Persuasion +8, Acrobatics +9",
      content: `Expertise doubles the proficiency bonus on selected skills. Persuasion +8 (Charisma +4, doubled proficiency +4) is the best social modifier in the party. When words need to open doors, Jack speaks.

Acrobatics +9 (Dexterity +5, doubled proficiency +4) makes Jack exceptionally mobile and hard to restrain. Escape grapples, tumble past obstacles, maintain balance on narrow surfaces, dodge through tight spaces. Combined with Blade Flourish's +10-foot speed bonus (Mobile Flourish), Jack is slippery and fast.

In Waterdeep's social ecosystem, Persuasion +8 is a primary tool. Negotiations, faction interactions, convincing witnesses, de-escalating confrontations -- these situations arise constantly, and Jack's modifier makes them reliably successful.` },
    { title: "Fighting Style: Two-Weapon", desc: "Off-hand dagger with full Dexterity mod, mastered critical hit on 19-20",
      content: `Two-Weapon Fighting lets Jack add his full Dexterity modifier (+5) to off-hand dagger attacks. The daggers are mastered, expanding their critical hit range to 19-20. The off-hand attack uses the Bonus Action.

This creates a consistent two-attack routine: Rapier (main hand, triggers Blade Flourish) + dagger (Bonus Action, 1d4+5, critical hit on 19-20). Total output is roughly 20.5 per round before accounting for Flourish's AC boost.

The Bonus Action is contested -- off-hand dagger competes with Bardic Inspiration, Healing Word, and other Bonus Action options. When pure damage output is the priority, the dagger is free extra damage. When support is needed, the Bonus Action goes elsewhere.` },
  ],
  snik: [
    { title: "Assassinate", desc: "Advantage + bonus damage in round 1 vs creatures that haven't acted",
      content: `During the first round of combat, you have Advantage on attack rolls against any creature that hasn't yet taken a turn. You also roll Initiative with Advantage (roll twice, take the higher). If you land Sneak Attack on a creature that hasn't acted, Assassinate adds +3 bonus damage.

Everything about Snik's opening is designed to maximize this moment. Stealth +9 for pre-combat positioning. Initiative with Advantage to act first. Advantage on the attack for high critical hit probability (roughly 19% with mastered 19-20 range). Full Sneak Attack plus Assassinate bonus for 19.5 average damage.

After round 1, Assassinate is spent. The alpha strike is a one-time event. Make it count by choosing the right target (highest threat, not necessarily the closest enemy) and positioning before initiative is rolled whenever possible.` },
    { title: "Sneak Attack (2d6)", desc: "Extra 2d6 damage once per turn with Advantage or an adjacent ally",
      content: `Once per turn, when you hit with a Finesse or ranged weapon and have Advantage OR an ally is within 5 feet of the target, add 2d6 to the damage. This is the core of Rogue damage output.

Multiple triggers ensure Sneak Attack lands consistently: the Shadow Engine (Hidden behind Bjorn gives Advantage), Faerie Fire (party-wide Advantage), ally adjacency (Bjorn, Khorvax, or Mobius in melee), and Assassinate (first round Advantage).

Once per TURN, not per ROUND. Opportunity Attacks on an enemy's turn can carry Sneak Attack if it hasn't been used on that turn. This is the basis of the Opportunity Attack Trap signature move -- position near enemies who might move, and the enemy's own actions give you a second Sneak Attack.` },
    { title: "Cunning Action", desc: "Bonus Action to Dash, Disengage, or Hide",
      content: `Bonus Action to Dash (double movement to 60 feet), Disengage (no Opportunity Attacks from anyone), or Hide (Stealth check to become Hidden). This is Snik's primary Bonus Action every turn.

The most common use is Cunning Action Hide, especially behind Bjorn (Naturally Stealthy). Attack, hide, repeat. Hidden grants Advantage on the next attack, which means guaranteed Sneak Attack eligibility without needing allies nearby or Faerie Fire.

Dash is the chase tool -- 60 feet of movement reaches almost anything on the battlefield. Disengage is the escape when you're surrounded and can't hide. The choice between these three defines Snik's positioning and survival strategy each turn.` },
    { title: "Naturally Stealthy", desc: "Hide behind any Medium or larger creature",
      content: `You can attempt to Hide even when you are obscured only by a creature that is at least one size larger than you. As a Small creature (Halfling), any Medium or larger creature counts -- which is every party member and most NPCs.

In combat, this means Bjorn (or any ally) is a mobile piece of cover. Attack, Cunning Action Hide behind the nearest Medium creature, vanish. Next turn, attack from Hidden with Advantage. The Shadow Engine runs on this feature.

Outside combat, Naturally Stealthy means Snik can tail anyone through a crowded street by walking behind passers-by. Hide behind a merchant, duck behind a guard, tuck into Bjorn's shadow. In Waterdeep's busy districts, there is always someone to hide behind.` },
    { title: "Nimbleness", desc: "Move through any Medium or larger creature's space",
      content: `You can move through the space of any creature that is at least one size larger than you. As a Small creature, that means any Medium or larger creature -- allies and enemies alike.

Enemy lines cannot block Snik. A corridor packed with guards is an open road. Three bodyguards surrounding a target are scenery. Combined with Cunning Action Dash (60 feet of movement), Snik reaches any point on the battlefield regardless of who's in the way.

This also has non-combat applications. Crowded rooms, packed markets, narrow alleys with obstructions -- spaces that slow or stop Medium characters are open to Snik.` },
    { title: "Halfling Lucky", desc: "Reroll any natural 1 on d20 rolls automatically",
      content: `Whenever you roll a natural 1 on a d20 (attack roll, ability check, or saving throw), you must reroll and use the new result. This is automatic and unlimited -- it eliminates the worst 5% of all outcomes on every single d20 roll you ever make.

This doesn't guarantee success, but it removes catastrophic failure. The natural 1 on the critical Stealth check? Rerolled. The natural 1 on the Assassinate opening attack? Rerolled. Over the course of a campaign, eliminating natural 1s prevents dozens of disastrous moments.` },
    { title: "Brave", desc: "Advantage on saves vs Frightened",
      content: `Advantage on all saving throws against the Frightened condition. Fear effects that would freeze other melee characters in place -- dragon fear auras, the Fear spell, Frightening Presence -- hit Snik with significantly reduced effectiveness.

For a melee Rogue who needs to stay close to enemies to deal damage, being immune to fear-based lockdown is critical. Frightened creatures can't willingly move toward the source of fear and have Disadvantage on ability checks and attacks. Being able to resist this keeps Snik in the fight when others might be running.` },
    { title: "Expertise", desc: "Stealth +9, Acrobatics +9",
      content: `Stealth +9 makes Snik nearly undetectable. Most creatures at this tier have Passive Perception in the 10-13 range. Even active searches struggle against a +9 modifier. Combined with Naturally Stealthy, Snik vanishes reliably in almost any environment.

Acrobatics +9 is the escape hatch. Grappled? Contest with Acrobatics to break free. Need to tumble through a tight space, maintain balance on a narrow ledge, or land safely from a jump? +9 covers it. This is the answer to the one thing Snik's build is vulnerable to -- being physically grabbed and held.` },
  ],
  saeris: [
    { title: "Psychic Blades", desc: "1d6+5 psychic, Finesse, throwable 60 feet, no physical trace",
      content: `When you take the Attack action, a blade of shimmering psychic energy manifests in your hand. 1d6+5 psychic damage, Finesse (Dexterity-based), qualifies for Sneak Attack, throwable to 60 feet. It vanishes after striking.

A second blade can manifest as a Bonus Action for 1d4+5 damage. This second strike is not eligible for Sneak Attack but provides reliable additional damage every turn.

The defining trait: psychic damage bypasses almost all monster resistances, and the blades leave no physical evidence. No weapon to disarm, detect, or identify. No wound pattern for forensics. No sound on the strike. In Waterdeep, where the Watch investigates killings and magical forensics exist, this matters enormously.` },
    { title: "Sneak Attack (2d6)", desc: "Extra 2d6 damage once per turn with Advantage or an adjacent ally",
      content: `Same mechanics as Betty and Snik's Sneak Attack -- 2d6 extra damage once per turn when you have Advantage or an ally is within 5 feet of your target. Psychic Blades qualify as Finesse weapons, so every Blade attack is Sneak Attack eligible.

The party provides multiple Advantage sources: Faerie Fire (Huck or Jack), prone enemies (Bjorn's shove), Hidden status (Cunning Action Hide). With Blessing of the Raven Queen as an emergency escape, Saeris can afford to stay in melee range for ally-adjacency triggers.

Total Sneak Attack output with Psychic Blades: 1d6+5+2d6 = average 16.5 psychic damage. Nearly unresistable. The consistency of this damage makes Saeris a reliable damage dealer even against heavily defended enemies.` },
    { title: "Cunning Action", desc: "Bonus Action to Dash, Disengage, or Hide",
      content: `Standard Rogue toolkit: Dash, Disengage, or Hide as a Bonus Action. For Saeris, the Bonus Action is particularly contested because the second Psychic Blade also uses the Bonus Action.

The choice each turn: second Psychic Blade (1d4+5 damage) versus Cunning Action (mobility or stealth). When damage is the priority and you're safely positioned, take the second blade. When you need to escape, reposition, or set up Hidden for Advantage, Cunning Action is the tool.

Cunning Action Disengage is the safety valve for a melee Rogue without Fancy Footwork. Saeris doesn't get Betty's free disengage -- withdrawing safely costs the Bonus Action and therefore costs the second blade's damage.` },
    { title: "Psionic Energy (4 per Long Rest)", desc: "Fuel for Psi-Bolstered Knack and Psychic Whispers",
      content: `You have 4 Psionic Energy dice per Long Rest, with 1 recovering on a Short Rest. These fuel Psi-Bolstered Knack (add to failed checks) and Psychic Whispers (establish telepathic links).

The economy is generous thanks to Psi-Bolstered Knack's refund mechanic (die returns if it turns a failure into a success) and Short Rest recovery. In practice, Saeris has significantly more than 4 effective uses per day.

Manage these as a pool, not as individual charges. One die for Psychic Whispers to link the team. The remaining dice for Knack on critical skill checks. Short Rest to recover one. The pool refills enough that you shouldn't be hoarding them.` },
    { title: "Psi-Bolstered Knack", desc: "Add psi die to failed proficient checks; refund if it works",
      content: `When you fail an ability check that uses a skill or tool you're proficient with, you can add one Psionic Energy die to the result. If the new total equals or exceeds the DC, you succeed AND the die is not consumed -- it returns to your pool.

This refund is the key insight. Use the dice aggressively on any close failure. Failed by 3? The die might show a 4 and you succeed for free. Failed by 7? You'll probably lose the die, but you were going to fail anyway. The expected cost per use is much lower than 1 die because successes refund.

Applies to proficient skills: Stealth, Acrobatics, Deception, Intimidation, and whatever tools Saeris chose via Trance that morning. This safety net covers the moments that determine whether operations go clean or sideways.` },
    { title: "Psychic Whispers", desc: "Telepathic link with 2 creatures for hours, one-mile range",
      content: `Spend 1 Psionic Energy die to establish telepathy with up to 2 creatures you can see. The link lasts for a number of hours equal to your Psionic Energy die roll. One-mile range. No language barrier.

In combat: silent coordination. Call targets, signal flanks, warn of threats -- all without speaking. Enemies who rely on hearing your communications get nothing.

Outside combat: the Ravens' secure communication channel. Coordinate across an entire ward. The scout reports without breaking cover. The infiltrator communicates from inside the building. In Waterdeep, where eavesdropping is a profession, telepathy is the only truly private conversation.` },
    { title: "Blessing of the Raven Queen", desc: "30-foot teleport + all damage resistance for 1 round, twice per Long Rest",
      content: `Bonus Action: teleport 30 feet to a visible space AND gain resistance to ALL damage types until your next turn. Twice per Long Rest. This is escape, repositioning, and survival in a single Bonus Action.

All damage resistance means fire, psychic, radiant, force, necrotic -- everything is halved for one full round. The teleport breaks grapples, restraints, and environmental traps. You arrive at your destination with damage reduction already active.

Two uses per Long Rest. Each one can save a life or completely reset a bad position. The instinct to save them for emergencies is natural but often counterproductive -- spending one proactively to avoid a bad situation is better than spending one reactively to survive one.` },
    { title: "Trance Proficiency Swap", desc: "Two new tool or weapon proficiencies each Long Rest",
      content: `During your 4-hour Trance (Saeris doesn't sleep -- she meditates), choose 2 weapon or tool proficiencies. These replace any previously chosen Trance proficiencies and last until the next Long Rest.

Thieves' Tools for a break-in. Forgery Kit for false documents. Disguise Kit for a false identity. Poisoner's Kit for chemical work. Herbalism Kit for identification. Smith's Tools for repairs. The selection is broad and the daily reset means the party's toolbox reconfigures every morning.

Between Saeris and Ezmerelda (who shares this feature), the Ravens have 4 flexible proficiency slots per day. Plan the mission, assign the tools, execute. No job catches the party without the right skill set.` },
    { title: "Fey Ancestry", desc: "Advantage vs Charmed, immune to magical sleep",
      content: `Advantage on saving throws against being Charmed. Complete immunity to magical sleep effects. These are passive and permanent -- no activation required.

Charm effects are common tools of manipulation in Waterdeep's social landscape. Charm Person, Suggestion, and similar enchantments target Charisma or Wisdom saves, and Advantage on these saves makes Saeris significantly harder to mentally compromise.

Sleep immunity means spells like Sleep simply don't work on Saeris. Combined with the 4-hour Trance (fully conscious during "rest"), Saeris is the party member who can never be caught sleeping -- literally.` },
  ],
  ezmerelda: [
    { title: "Hunter's Mark", desc: "Bonus Action, +1d6 per hit, reveals defenses, twice free per Long Rest",
      content: `Bonus Action to mark a creature within 90 feet. Each hit against the marked target deals an extra 1d6 damage. Concentration, lasts up to 1 hour. When the marked target drops to 0 hit points, you can move the mark to a new target as a free Bonus Action.

Twice per Long Rest, this costs no spell slot. The mark persists through target deaths (free transfer), so two free casts can cover an entire multi-encounter adventuring day if targets keep dying. Additional casts beyond the free uses cost 1st-level slots.

The mark is also the trigger for Profiling the Mark -- the instant intelligence on enemy defenses. This dual purpose (damage + intelligence) makes Hunter's Mark the default opening Bonus Action in virtually every combat.` },
    { title: "Boss Fight", desc: "Extra 1d8 damage against anything already missing hit points",
      content: `When you hit a creature that is below its hit point maximum, the attack deals an extra 1d8 damage. This activates the moment anyone touches the target -- one scratch from any source, and every subsequent crossbow bolt carries the bonus.

The escalation curve is significant. A fresh target takes Crossbow + Mark damage. A wounded target takes Crossbow + Mark + Boss Fight. The longer the fight goes, the more dangerous Ezmerelda's sustained output becomes. Against boss-type enemies with large hit point pools, Boss Fight adds substantially over the course of the encounter.

No resource cost, no activation. It's passive and automatic once the condition (target below max hit points) is met. This rewards focus fire -- the party damages the target, and Ezmerelda's follow-up shots carry escalating payloads.` },
    { title: "Automatic Crossbow", desc: "+9 to hit, 1d8+5, critical hit on 19-20, 80/320 range",
      content: `+9 to hit is the highest attack bonus in the party. Against AC 15 (a common benchmark), that's a 75% base hit rate, rising to 94% with Advantage. The crossbow is mastered, expanding the critical hit range to 19-20.

80-foot normal range puts Ezmerelda in a fundamentally different position than the melee fighters. She operates from distance, often from elevated positions, with a clear view of the entire battlefield. The 320-foot long range (with Disadvantage) means even fleeing targets remain vulnerable.

One attack per round (crossbow limitation), but every shot carries the full damage stack: base + Mark + Boss Fight. Quality over quantity -- one carefully aimed bolt doing 17.5 average damage from 80 feet away.` },
    { title: "Profiling the Mark", desc: "Learn target defenses instantly when marking",
      content: `When you cast Hunter's Mark on a creature, you immediately learn its damage immunities, resistances, and vulnerabilities. No check, no action cost, no save -- the information is instant and free.

This intelligence reshapes how the entire party approaches the fight. "Resistant to fire, vulnerable to radiant" changes Kiron's spell selection and makes Khorvax's Smite the priority. "Immune to poison" tells Huck not to bother with certain tools. The tactical value extends far beyond Ezmerelda's own damage.

In encounters with unfamiliar creatures -- and Waterdeep's underworld has plenty -- Profiling the Mark eliminates guesswork. The party doesn't waste resources on ineffective damage types. One Bonus Action from Ezmerelda informs every decision for the rest of the fight.` },
    { title: "Blessing of the Raven Queen", desc: "30-foot teleport + all damage resistance for 1 round, twice per Long Rest",
      content: `Same Shadar-Kai feature as Saeris. Bonus Action, twice per Long Rest. Teleport 30 feet and gain resistance to all damage types until your next turn.

For Ezmerelda specifically, this is the gap-reset tool. When something fast closes the 80-foot buffer, Blessing teleports you 30 feet away with damage resistance active. The enemy spent resources bridging the distance and has nothing to show for it.

Also useful for reaching elevated positions (rooftops, balconies) without climbing, escaping grapples or restraints, and emergency repositioning when the battle shifts unexpectedly.` },
    { title: "Trance Proficiency Swap", desc: "Two new tool or weapon proficiencies each Long Rest",
      content: `Same Trance feature as Saeris. Four-hour rest, conscious throughout, choose 2 new tool or weapon proficiencies daily. Between Ezmerelda and Saeris, the Ravens have 4 flexible proficiency slots every morning.

Ezmerelda's Ranger background makes her proficiency choices particularly effective. Herbalism Kit for identifying plants and poisons. Navigator's Tools for maritime or overland pursuit. Cartographer's Tools for mapping. Combined with Survival +6 (Expertise) and Investigation +4, the right proficiency turns Ezmerelda into whatever specialist the mission requires.` },
    { title: "Fey Ancestry", desc: "Advantage vs Charmed, immune to magical sleep",
      content: `Advantage on saves against Charmed. Immunity to magical sleep. Passive and permanent. Same benefits as Saeris -- the Shadar-Kai heritage provides built-in mental defenses that matter in Waterdeep's world of enchantment and manipulation.` },
    { title: "Natural Explorer", desc: "Expertise-equivalent in Survival; difficult terrain doesn't slow the party",
      content: `Ranger training grants effective Expertise in Survival (+6 total). The party ignores difficult terrain during overland travel and can't become lost except by magical means.

Survival +6 covers tracking, foraging, reading environmental signs, and navigating unfamiliar terrain. In Waterdeep's sewers, the surrounding wilderness, or Undermountain's upper levels, this is the skill that keeps the party from getting lost or ambushed by something they should have noticed.` },
  ],
  kiron: [
    { title: "Portent", desc: "Replace any d20 roll with a pre-rolled result, twice per Long Rest",
      content: `At dawn, roll two d20s and record the results. At any point before your next Long Rest, when a creature you can see is about to make an attack roll, saving throw, or ability check, you can replace their roll with one of your recorded Portent dice. The creature doesn't roll -- your number IS the result.

Low dice (1-8) are guaranteed failed saves. Web + Portent 3 = Restrained, no save allowed. Tasha's Mind Whip + Portent 2 = the target loses most of its turn. You decided the outcome at dawn.

High dice (15+) are guaranteed successes for allies. Bjorn's Wisdom save against domination? Your 18 replaces his roll. Huck's concentration check? Your 17. Each Portent die is one moment per day where Kiron dictates the outcome. Choose those moments wisely.` },
    { title: "Alert: Initiative Swap", desc: "Trade initiative with any willing ally after seeing the full order",
      content: `After initiative is rolled and the order is set, you can trade your initiative score with any willing ally. This happens after you see the full order, so you make the decision with complete information.

The question isn't "when should Kiron act?" but "who needs to act first?" Snik for Assassinate. Huck for Faerie Fire. Bjorn for Rage before taking damage. The answer changes every fight, and Kiron adapts by giving away the position that matters most.

This interacts with Portent. If Snik is opening with Assassinate and you have a low Portent die, swap Initiative to let Snik go first AND replace the target's defense with your Portent. Two features engineering the perfect opener.` },
    { title: "Arcane Recovery", desc: "Recover up to 2 levels of spell slots on a Short Rest, once per Long Rest",
      content: `After a Short Rest, once per Long Rest, recover spell slots totaling up to 2 levels. That's either one 2nd-level slot or two 1st-level slots. This effectively gives Kiron an extra Web, an extra Shield, or two extra 1st-level spells across the full adventuring day.

The extra resources matter because Kiron's slots are the party's control resources. Every Web, every Mind Whip, every Shield is a decision about what the rest of the day looks like. Arcane Recovery buys breathing room.

Take the Short Rest. The party benefits from other Short Rest features too (Khorvax recovers Channel Divinity, Mobius recovers Focus Points). Advocate for resting when it's safe to do so.` },
    { title: "Breath Weapon", desc: "15-foot cone or 30-foot line of fire, Dexterity DC 14, 1d10, twice per Long Rest",
      content: `15-foot cone or 30-foot line. Dexterity save DC 14. 1d10 fire damage. Twice per Long Rest. Modest damage and save DC, but it costs absolutely nothing -- no spell slot, no resource other than the two daily uses.

Use when enemies cluster at close range and a real spell slot isn't worth the investment. Use to ignite oil (from Huck's Tinker's Magic). Use when spell slots are depleted and you need area damage.

The Dragonborn heritage is both mechanical and narrative. Fire resistance (passive, permanent) pairs with this. Kiron breathes fire and shrugs off flames -- the draconic identity is built into the character at every level.` },
    { title: "Expertise: Arcana", desc: "Arcana +9, History +7, Investigation +7",
      content: `Arcana +9 (Expertise) is the party's primary tool for identifying magical phenomena. Recognize spells being cast, evaluate magical items, understand arcane theory, assess planar effects. In a campaign where magic underlies nearly every major plot element, this is the analytical foundation.

History +7 covers Waterdeep's deep past and broader lore. Investigation +7 handles present-day analysis: examining evidence, finding hidden compartments, connecting disparate clues. Together, these three skills make Kiron the character who figures things out.

When the Ravens encounter something mysterious, ancient, or magical, Kiron is the first resource. Huck can Identify items (ritual), but Kiron can theorize about origins, implications, and connections that raw identification doesn't reveal.` },
    { title: "Shield (Reaction)", desc: "+5 AC for 1 round; unavailable while concentrating (house rule)",
      content: `Reaction: +5 AC until the start of your next turn. AC 18 becomes 23. This is Kiron's primary survival tool against incoming attacks.

House rule: Shield is unavailable while you're concentrating on a spell. This means choosing to maintain Web or Faerie Fire means Shield is offline for the duration. This is a meaningful tradeoff -- committing to concentration commits you to a more vulnerable defensive posture.

Plan accordingly. If you cast Web, you're relying on positioning and the party's frontline for protection instead of Shield. If you're holding concentration open (no active spell), Shield is available for the critical moment when an attack gets through.` },
  ],
  khorvax: [
    { title: "Divine Smite", desc: "Bonus Action after hitting: 2d8 radiant, once free per Long Rest plus spell slots",

// BACKSTORIES
const BACKSTORIES = {
  betty: `Betty is the twin sister of Black Jack Drallion. They grew up in Waterdeep, on the streets from a young age. She, Jack, and Huck were the original trio, running street performances and outsmarting rival street gangs before any of the others came into the picture. They linked up with Khorvax and Kiron around Coin Alley at about age seven. When they started hanging around Coin Alley together, they all began to notice how Waterdeep was not fair. Later, when Snik and Bjornblud arrived at age nine and linked in, the group started punching above their weight. The average age was ten. They were already targeting people who deserved targeting.

Betty was abducted into the Undermountain with the others at age ten. She came back two years older with no memory to fill the gap, carrying a shared fighting style and non-verbal communication language with the rest of the Ravens.

After returning, Betty ran early cons and thefts in Waterdeep through the teenage years in Mistshore. She built a network of information channels during this period. Her cons are not simple theft. She plays elaborate schemes that do more than fleece money; they ruin reputations and status. She picks her marks carefully so that only the worst people get her worst. She is a planner, a strategist, and an intelligence gatherer.

She is fanatical about freedom and standing up for the underdog. She will ruin the lives of slavers with glee.

When the Ravens scattered, Betty went out into the world to earn her levels. After the Mistshore fire, which killed Mama Koney and destroyed the community that raised them through adolescence, Betty returned to Waterdeep. She and the other Ravens suspect foul play beyond the obvious and have committed to spreading out through the city's factions and intelligence networks to find the culprits.

She hates Xanathar. She thinks there is something sinister about the Cassalanters.`,
  bjorn: `Bjornblud was not born a Goliath among Goliaths. He was mystically switched at birth with the twin of a halfling named Snicklefritz, placed into a loving halfling family and community somewhere outside Waterdeep. The switch became impossible to ignore early; by age five he had outgrown every halfling adult in the village. Nobody knows what happened to Snik's actual twin. Nobody knows why the switch occurred.

Despite being the largest person anyone in his community had ever seen, Bjorn was raised with halfling values, halfling warmth, and halfling sensibilities. He loves halflings the way a child loves the only family he has ever known. He speaks Halfling. He defaults to restraint not out of timidity but out of awareness that he could break everything around him if he did not. When he rages, it is a deliberate choice, not a loss of control, and he loves the rush.

He and Snik were inseparable troublemakers. By age nine, the pair had caused enough problems that they decided "elsewhere" would be the best thing for the family. They left under cover of night for Waterdeep.

In the city, they found their grift fast. Snik would gaslight crowds of rich kids into picking fights with Bjorn, and while everyone's eyes were on the spectacle of a child-sized Goliath, Snik picked the onlookers' pockets clean. Khorvax, a working-class kid from Coin Alley with a glory hound's instinct for attention-worthy situations, spotted the pair, recognized what they were doing, and brought them into the growing circle that would become the Black Ravens.

At age ten, Bjorn was abducted along with the others into the time-phased tunnels of Undermountain. From Waterdeep's perspective, he was gone a week. He came back two years older with no memory to fill the gap, carrying a shared fighting style and a non-verbal communication language bonded into him alongside nine other children.

The teenage years were spent in Mistshore aboard a derelict ship with the rest of the Ravens, supervised by Mama Koney and Cookfui. Among many adventures in those years, Bjorn and Khorvax fought in an underage back-alley fighting tournament run by the Xanathar Guild. That is the root of his hatred for Xanathar: not ideology, but personal experience with being ground up for a beholder's entertainment as a child.

At twenty, Bjorn and Snik set off together again, adventuring back through halfling country. They accumulated enough trouble to be wanted by three separate jurisdictions. Word of the Mistshore fire reached them in Saltmarsh. The fire killed Mama Koney and destroyed the community that had raised them through their teenage years.

They came back. In the year since the fire, Bjorn has been taking enforcer jobs at large taverns and inns across Waterdeep, using the work as a cover to gather intelligence on the factions maneuvering for dominance in a city that feels like it is about to boil over. He is not subtle about his presence; a Goliath working the door of a busy tavern hears everything. He is subtle about what he does with what he hears.`,
  snik: `Snik was born into a halfling community outside Waterdeep. He had a twin who was mystically switched at birth with a Goliath child who would become Bjornblud. What happened to Snik's actual twin is unknown. What he got instead was a brother-sized best friend who grew to tower over every adult in their village before starting school.

Snik was a Twainesque kid from the start. He got into trouble not because he was angry or desperate but because he wanted to see if he could get out of it. Every scheme was a test of his own cleverness. Bjorn was the spectacle; Snik was the operator. Together they were too much for a peaceful halfling community to absorb. By age nine they made the decision themselves: leave under cover of night, head for Waterdeep, spare the family the fallout.

In the city they found their rhythm immediately. Snik would read a crowd of wealthy kids, identify the mark, then gaslight bystanders into picking a fight with Bjorn. While everyone watched the impossible sight of a child-sized Goliath in a scrap, Snik moved through the crowd with his hands in their pockets. It was not desperation theft. It was performance art with a profit margin.

Khorvax found them first. Then they linked into Betty, Jack, and Huck's existing street operation. Snik found the next level of mischief. He also found his first real enemies: a rival kid gang of wererats, encountered at age nine in the streets of Waterdeep. That feud never ended. It just aged.

At ten, the abduction. Undermountain. The time-phased tunnels. One week from Waterdeep's perspective; two years from his. He came back age twelve, carrying a shared fighting style and non-verbal language with the other Ravens, and no memory of how he learned either.

The teenage years in Mistshore were formative. The Ravens ran cons, built networks, and survived on the margins of Waterdeep under the watch of Mama Koney and Cookfui. Snik honed himself into a precision instrument during these years. His class is Assassin, but he is not an assassin by trade or temperament. He took the archetype because it makes him the sharpest single-strike tool in the party. His approach to poison is pharmaceutical, not lethal: he doses for hallucinations, disorientation, spell-like effects. He wants to control the situation, not end a life. The killing is incidental to the craft.

At twenty he and Bjorn set out again, adventuring through halfling country and beyond. They were wanted in three jurisdictions when word of the Mistshore fire reached them in Saltmarsh. Mama Koney was dead. The community that raised them through adolescence was ashes and charred ship timber.

They came back to Waterdeep. In the time since, Snik's childhood wererat rivals have grown up too. They are now an organized, Xanathar-aligned gang of halfling wererats. The Shard Shunners may be the same gang or a parallel operation. Either way, Snik is in an active feud with halfling wererats who have faction backing he did not have to deal with when they were all just kids.`,
  ezmerelda: `Ezmerelda was born in the original drow capital during the first age under Lolth. Her family line was palace security, the Manhunter caste: generations of trackers, hunters, and protectors serving the royal family. She and Saeris were childhood friends from birth, connected by proximity and her family's role guarding his.

She was ten when Saeris's parents sacrificed him to Lolth to eliminate succession strife. Ezmerelda tried to stop it and was sacrificed alongside him.

The Raven Queen intercepted them both and pulled them into the Shadowfell. There, under the care of Mama Koney, a Raven Queen priestess, Ezmerelda learned to hunt and stalk in the timeless dark. Over their stay, she and Saeris transformed from drow to Shadar-Kai. Pale skin, purple eyes, white hair.

During the Undermountain escape, she and Saeris served as guides for the abducted children through the Shadowfell portions of the route. They emerged into Waterdeep with the other Ravens.

In Mistshore, she became known as the person who could find anyone. She trained with Vincent Trench at the Tiger's Eye detective agency. During her walkabout years, she traveled with a band of Vistani and monster-hunted with Van Richten.

Since the Mistshore fire, she has been pursuing Bounty Hunter's Guild membership. In Session 1 she earned an apprentice membership by bringing in Krentz alongside Khorvax.

She talks to Mama Koney every morning at dusk. Mama Koney died in the fire. The nature of this practice has not been clarified.`,
  saeris: `Saeris was not born in this age. He was born in the first age of the original drow kingdom, into the royal family's second generation under Lolth. This was the era of the conflict involving Correlon, Lolth, and the Raven Queen. Saeris was the firstborn son, but under the new matriarchal order of Lolth, his younger sister would ascend. There was no room for ambiguity about succession. His parents sacrificed him to Lolth at age ten, not out of hatred but out of political calculation: eliminate the son so there is no future strife, and demonstrate fealty to the new order in a single act.

He did not reach Lolth. The Raven Queen, still reeling from her own betrayal, intercepted Saeris between the moment of sacrifice and the moment of claiming. She pulled him into the Shadowfell.

He was not alone. Ezmerelda, his childhood friend from a separate family line, had tried to stop the sacrifice and was killed alongside him. The Raven Queen took them both.

In the Shadowfell there is no time. Saeris and Ezmerelda did not age. They were watched over by Mama Koney, a Raven Queen priestess. Under her care, Saeris learned to read dream-thoughts. Ezmerelda learned to hunt and stalk. Over their indefinite stay, both children transformed. They entered the Shadowfell as drow. They became Shadar-Kai. Pale skin, purple eyes, white hair. Prolonged exposure to the Shadowfell transforms a being. Saeris and Ezmerelda are drow-origin Shadar-Kai, which makes them unusual even among their kind.

The connection to the other Ravens happened during the Undermountain escape. The time-phased tunnels border the Shadowfell. When the abducted children were navigating the portals between eras, Saeris and Ezmerelda encountered them and acted as guides, helping them traverse the Shadowfell portions and navigate the shifting portals back to the Material Plane. They brought Mama Koney and themselves out with the children.

He stayed with the Ravens in Mistshore through the teenage years. While the others had roots in Waterdeep, Saeris and Ezmerelda had nothing outside the group. The Ravens were not just friends; they were the entirety of their existence in the material world.

His faction positioning is the most dangerous in the party. He has renown with the Zhentarim on both sides of the schism: the Doom Raiders and Manshoon's faction. He has small clout with the Xanathar Guild. Every other Raven who has Xanathar contact hates them. Saeris works with them. This makes him the party's most valuable intelligence asset in the criminal underworld and simultaneously the member most likely to be caught in a factional crossfire.

His faith is listed as Agnostic, which is notable for someone who was literally saved from divine sacrifice by a goddess and raised by her priestess. He does not worship the Raven Queen. He was protected by her. Whether gratitude and worship are the same thing is apparently a question he has not resolved.`,
  jack: `Jack is the twin brother of Black Betty. They grew up in Waterdeep, starting on the streets young with Huck. The three of them ran street performances and outsmarted rival street gangs before linking up with Khorvax and Kiron around Coin Alley. When Snik and Bjornblud arrived from outside the city at age nine, the crew escalated. By ten, the core group was assembled.

Then the abduction. Undermountain. One week from Waterdeep's perspective, two years from his. He came back at about twelve with no memory to fill the gap, carrying a shared fighting style and non-verbal communication language with the other nine.

During the Undermountain escape, Jack found a barely three-year-old child named Mobius wandering the lava tubes with an injured monk master, Cookfui. Jack had instant rapport with the kid. That bond became one of the defining relationships of his teenage years.

In Mistshore, Jack and Mobius were inseparable. Their formative adventures together were in the Dock Ward during what is referred to as the Big Lopan Troubles, details of which have not yet been provided. Jack is the best socially connected Black Raven. He gets out ahead of any Ravens story and spins it almost too far. His instrument is a pair of drumsticks that he is always subconsciously carrying a rhythm with. His rapiers become drumsticks when he fights.

Before returning to Waterdeep after the Mistshore fire, Jack was making a name for himself as a traveling bard and black market runner. He is now back in the city reviving his Waterdeep contacts heading into the grand game.`,
  mobius: `Mobius was not born in this era. Thousands of years ago, when Waterdeep was a temple complex, Mobius was a child in the valley below Mount Waterdeep near a monastery. These were the last days of the last era of the Waterdeep Temples, when the once harmonious temples were in open conflict on an epic scale. An aggressive force of monks from a rival temple called the Unblemished Fist came to slay all children born in the Year of the Sun/Moon. Mobius was one of them.

At age two, he was saved by Cookfui, one of the grand monks of his monastery. Cookfui escaped into the Undermountain with the child and became lost through the time portals, wandering between eras until Jack found them in the lava tubes during the Ravens' escape. Cookfui was injured. Mobius was barely three, wandering alongside a broken guardian.

Jack took to Mobius immediately. When the Ravens emerged into present-day Waterdeep, Mobius came with them, along with Cookfui and Mama Koney. He was approximately three years old while the other Ravens were approximately twelve.

In Mistshore, Mobius grew up under the care of Cookfui, Mama Koney, and the Ravens collectively. He began spending time at the Temple of the Sun, whose members recognized something in him they call a "chosen one" spark. His formative adventures were with Jack in the Dock Ward during the Big Lopan Troubles.

Since the Mistshore fire, Mobius has taken to leading the street urchins of Waterdeep as citywide eyes for the Ravens. He is eleven years old at campaign start.

There is a secret attached to Mobius. Cookfui is the Enlightened One. Mobius is Cookfui slowly reincarnating. Cookfui's progressive mental deterioration is concurrent with Mobius's development. The once-enlightened grand monk is fragmenting as the child he saved grows into whatever Cookfui once was.`,
  khorvax: `Khorvax is a Celestial. In this setting, Celestials are randomized births who grow up unusually healthy and discover their nature at puberty. He grew up working-class poor in the Coin Alley area, raised by his blacksmith grandfather and leather weaver mother.

He fell in with Kiron at age three in Coin Alley. They linked up with Betty, Jack, and Huck at about age seven. At nine, Khorvax spotted Bjornblud and Snik working a crowd of rich kids, recognized both the spectacle and the scam for what they were, and brought them in. He was drawn partly by genuine helpfulness and partly by a glory hound's instinct for how attention-worthy the Goliath-and-Halfling pair were. He was the kid who stood up for other kids in Coin Alley and Mistshore. That instinct to protect and to be seen protecting was present from the beginning.

At ten, Khorvax was among the children abducted into the Undermountain. He came back two years older with no memories to account for the gap, carrying a shared fighting style and a non-verbal communication language that none of them could explain learning.

During the teenage years in Mistshore, one of many adventures was an underage back-alley fighting tournament run by the Xanathar Guild. Khorvax and Bjornblud fought in it together. That experience is the personal root of his hatred for Xanathar.

Despite his draw toward the structured discipline of a paladin, Khorvax is a brutal street fighter. The Oath of Glory and the Coin Alley brawler coexist in the same person. His overactive sense of justice is genuine, but the way he delivers it is not gentle.

When the Ravens scattered, Khorvax left Waterdeep as a squire. He returned after the Mistshore fire as a knighted paladin. He took a position as an entry-level beat cop in the City Watch. He is now the only watchman covering Mistshore and shares the Coin Alley and Tarnished Silver Alley beat with a washed-up, drinking, short-timer sergeant. His hope is to climb rank within the Watch for access to legal records on faction players operating in the city.

His oath of glory and overactive justice streak have rubbed the other City Watchmen the wrong way. Enforcing order and delivering justice are different things, and Khorvax has not reconciled them.`,
  kiron: `Kiron's origin is a mystery. Rishaal the Page-Turner, the gold dragonborn proprietor of Book Wyrm's Treasure, discovered an egg one day in the subterranean book vault beneath his shop. The egg was nested and kept warm by a shield. Rishaal hatched and raised the dragonborn child as his own. Where the egg came from, who left it, and why it was hidden in a vault full of rare books has never been answered.

Kiron grew up in Book Wyrm's Treasure, surrounded by the variety and rarity of Rishaal's collection. He fell in with Khorvax at a young age in Coin Alley, the blacksmith's grandson from down the street. Together the two boys became junior eyes for their neighbor Vincent Trench, the human detective who runs the Tiger's Eye. They would look out and spy for Trench, low-level kid stuff, but it planted a fascination with investigation in both of them. Kiron absorbed it deeper. Between Trench's detective work and Rishaal's library, he grew up with one foot in the streets and one foot in scholarship.

His dragon nature shows in a specific way: he is always looking to extract maximum value from any situation, including harvesting exotic creatures for components. By age ten he was conspiring with Huck, investigating old temple ruin layers north of Coin Alley, and learning to access the Weave mathematically through his calendar, his shield, and his spell focus. The shield that kept his egg warm became the instrument through which he channels magic.

Then the abduction. Kiron was taken into the Undermountain with the others at age ten. He returned two years older, carrying the same shared fighting style and non-verbal communication language as the rest of the Ravens, with no memory of how any of it was learned.

After returning, Kiron pursued wizard studies with the Watchful Order of Magists and Protectors under Rishaal's supervision. He continued his investigation work through Vincent Trench. During the Mistshore years and beyond, he developed into a hybrid of wizard, fighter, and investigator, drawing on all three streams that had shaped him since childhood.

Rishaal has been conducting deep research into the Undermountain mystery for years. Kiron has been putting that research together piece by piece. He is close to completing what is referred to as the Portal Map of the Undermountain, a working chart of the time-shifted tunnel system that swallowed the Ravens as children. If finished, it could be a major asset or a major catalyst.

Kiron is twenty-three, the oldest of the Ravens. He was raised by a dragonborn scholar in a bookshop on the same street where the Ravens now operate. He trained under a detective who is secretly a rakshasa. He studies magic under a guild that polices arcane practice in Waterdeep. And he is the one closest to mapping the place that took two years from all of them and gave nothing back but scars and skills they cannot explain.`,
  huck: `Huck is a gnome who grew up in Waterdeep. He was part of the original trio with Betty and Jack, running street performances and outsmarting rival street gangs from a young age. When they connected with Khorvax and Kiron around Coin Alley at about seven, and then Snik and Bjornblud at nine, Huck became the group's gadgeteer. By age ten he was conspiring with Kiron, investigating the old temple ruin layers north of Coin Alley.

At some point, an explosion took his arms and legs. He invented his own animated prosthetic limbs to replace them. The cause of the explosion has not been provided.

Huck was abducted into the Undermountain with the others at age ten. He came back two years older with no memory to fill the gap, carrying the same shared fighting style and non-verbal communication language as the rest of the Ravens.

During the teenage years in Mistshore, Huck was the gadgeteer for the Ravens' heists. The comparison is Simon Pegg in Mission Impossible: the person who builds the tools that make the impossible job work.

He has loose ties to the Temple of Gond, light ties to the Harpers, and medium ties to the Doom Raiders. He hates Xanathar.

He is synced with Betty, a connection noted in the campaign materials but not yet defined in the narrative.

Huck is twenty, the youngest of the Ravens aside from Mobius. His background is Charlatan.`,

// CHARACTER VIEW (REDESIGNED)
function CharacterView() {
  const [selectedId, setSelectedId] = useState(null);
  const [hovered, setHovered] = useState(null);
  const ch = selectedId ? CHARACTERS[selectedId] : null;
  const res = selectedId ? RESISTANCES[selectedId] : [];
  return (
    <>
      <div style={styles.rosterBar}>
        <div style={styles.rosterGrid}>
          {ROSTER_COLUMNS.flatMap((col, colIdx) => {
            const items = [
              <div key={`col-${colIdx}`} style={styles.rosterColumn}>
                {col.map((id, rowIdx) => (
                  <button
                    key={id}
                    style={styles.rosterToggle(selectedId === id, hovered === id, rowIdx === 0)}
                    onClick={() => setSelectedId(selectedId === id ? null : id)}
                    onMouseEnter={() => setHovered(id)}
                    onMouseLeave={() => setHovered(null)}
                    onTouchStart={() => setHovered(id)}
                    onTouchEnd={() => setTimeout(() => setHovered(null), 300)}
                  >
                    {CHARACTERS[id].short}
                  </button>
                ))}
              </div>
            ];
            if (colIdx < ROSTER_COLUMNS.length - 1) {
              items.push(<div key={`div-${colIdx}`} style={styles.rosterDivider} />);
            }
            return items;
          })}
        </div>
      </div>
      {!selectedId && (
        <div style={{ position: "relative", display: "flex", alignItems: "center", justifyContent: "center", minHeight: "50vh", padding: "40px 20px", overflow: "hidden" }}>
          <img src="/assets/raven.png" alt="" style={{ position: "absolute", width: "840px", opacity: 1, userSelect: "none", pointerEvents: "none", zIndex: 0 }} />
          <div style={{ textAlign: "center", fontFamily: FONT, position: "relative", zIndex: 1 }}>

      {selectedId && (

          {/* HEADER */}

          <span

            style={{
              fontSize: "28px",
              color: "#888",
              cursor: "pointer",
              transition: "color 0.15s",
              userSelect: "none",
              transform: "rotate(180deg)",
              lineHeight: 1,
            }}
            onMouseEnter={e => { e.target.style.color = "#fff"; }}
            onMouseLeave={e => { e.target.style.color = "#888"; }}
          >&#9654;</span>
          <div style={{ fontSize: "48px", fontWeight: 700, color: "#f0ece6", letterSpacing: "2px", textTransform: "uppercase", lineHeight: "1.1" }}>
            {ch.name}
          </div>
        </div>
        <div style={{ textAlign: "center", fontSize: "17px", color: "#6b7d8f", letterSpacing: "1px", marginTop: "4px", fontFamily: FONT }}>
          {ch.role}
        </div>
        <div style={{ display: "flex", justifyContent: "center", gap: "24px", marginTop: "12px", fontSize: "17px", fontFamily: FONT, flexWrap: "wrap" }}>
          <span><span style={{ color: "#6b7d8f" }}>HP </span><span style={{ color: "#f0ece6", fontWeight: 700 }}>{ch.hp}</span></span>
          <span><span style={{ color: "#6b7d8f" }}>AC </span><span style={{ color: "#f0ece6", fontWeight: 700 }}>{ch.ac}</span></span>
          <span><span style={{ color: "#6b7d8f" }}>SPD </span><span style={{ color: "#f0ece6", fontWeight: 700 }}>{ch.speed}</span></span>
          {res.length > 0 && (
            <span style={{ color: "#a0aec0" }}>{res.join(" | ")}</span>
          )}
        </div>
      </div>
      {/* SECTIONS */}
      <div style={{ paddingBottom: "40px" }}>
        {/* SIGNATURE MOVES */}
        {SIGNATURE_MOVES[selectedId] && (
          <>
            <div style={{...styles.sectionLabel, color: "#b0bec5"}}>Signature Moves</div>
            <CardGrid key={selectedId + "-sig"} items={SIGNATURE_MOVES[selectedId]} color={"#b0bec5"} />
          </>
        )}
        {/* CHARACTER FEATURES */}
        {FEATURES[selectedId] && (
          <>
            <div style={{...styles.sectionLabel, color: "#4ead6b"}}>Character Features</div>
            <CardGrid key={selectedId + "-feat"} items={FEATURES[selectedId].map(f => ({ name: f.title, preview: f.desc, content: f.content }))} color={"#4ead6b"} />
          </>
        )}
        {/* SPELL NOTES */}
        {SPELL_NOTES[selectedId] && (
          <>
            <div style={{...styles.sectionLabel, color: "#a78bfa"}}>Spell Notes</div>
            <CardGrid key={selectedId + "-spell"} items={SPELL_NOTES[selectedId].map(s => ({ name: s.title, preview: s.desc, content: s.content }))} color={"#a78bfa"} />
          </>
        )}
        {/* YOUR EDGE IN THE WORLD */}
        {EDGE_IN_THE_WORLD[selectedId] && (
          <>
            <div style={{...styles.sectionLabel, color: "#d97a3e"}}>Your Edge in the World</div>
            <CardGrid key={selectedId + "-edge"} items={EDGE_IN_THE_WORLD[selectedId]} color={"#d97a3e"} />
          </>
        )}
        {/* BACKSTORY */}
        {BACKSTORIES[selectedId] && (
          <BackstorySection key={selectedId + "-back"} text={BACKSTORIES[selectedId]} color={"#4a9eed"} />
        )}
      </div>
        </>
      )}
    </>
  );
}

const dirGlow = (ak, intensity = "normal") => {
  const a = ACCENT[ak]; const g = intensity === "strong" ? a.glowStrong : a.glow; const gs = a.glowStrong;
  if (ak === "yellow") return intensity === "strong" ? `inset 4px 3px 12px -4px ${gs}, -4px -3px 16px -5px ${gs}, 0 0 20px -6px ${g}` : `inset 3px 2px 8px -3px ${g}, -3px -2px 10px -4px ${g}`;
  return intensity === "strong" ? `inset -4px -3px 12px -4px ${gs}, 4px 3px 16px -5px ${gs}, 0 0 20px -6px ${g}` : `inset -3px -2px 8px -3px ${g}, 3px 2px 10px -4px ${g}`;
};

const dirBorder = (ak) => {
  const a = ACCENT[ak];
  if (ak === "yellow") return { border: "2px solid transparent", borderImage: `linear-gradient(to bottom right, ${a.borderSolid}, ${a.borderMid} 50%, ${a.borderDim} 85%, transparent) 1` };

};

const getRepHistory = (charId, entityId) => REPUTATION[charId]?.[entityId]?.history ?? [];
const getPartyAvg = (entityId) => { const vals = CHARACTER_ORDER.map((c) => getRepValue(c, entityId)); return Math.round((vals.reduce((a, b) => a + b, 0) / vals.length) * 10) / 10; };

const getPartyWorst = (entityId) => { let worst = null, worstVal = 6; CHARACTER_ORDER.forEach((c) => { const v = getRepValue(c, entityId); if (v < worstVal) { worstVal = v; worst = c; } }); return { charId: worst, value: worstVal }; };
const getLatestNote = (charId, entityId) => { const h = getRepHistory(charId, entityId); return h.length === 0 ? null : h[h.length - 1]; };
const sortByFavorability = (entities) => { const nonZero = [], zeros = []; entities.forEach((id) => { if (getPartyAvg(id) === 0) zeros.push(id); else nonZero.push(id); }); nonZero.sort((a, b) => getPartyAvg(b) - getPartyAvg(a)); return [...nonZero, ...zeros]; };

function ReputationView() {
  const [selectedChar, setSelectedChar] = useState(null);
  const [categoryFilter, setCategoryFilter] = useState(null);
  const [sortCol, setSortCol] = useState(null);
  const [sortDir, setSortDir] = useState("desc");
  const [expandedEntity, setExpandedEntity] = useState(null);
  const [selectedCell, setSelectedCell] = useState(null);

  const filteredEntities = useMemo(() => {
    if (!categoryFilter) return [];
    let entities = ENTITY_ORDER.filter((id) => categoryFilter === "all" || ENTITIES[id]?.category === categoryFilter);
    if (sortCol) {
      const nonZero = [], zeros = [];
      entities.forEach((id) => { const val = sortCol === "avg" ? getPartyAvg(id) : sortCol === "name" ? 1 : getRepValue(sortCol, id); if (sortCol === "name") nonZero.push(id); else if (val === 0) zeros.push(id); else nonZero.push(id); });
      if (sortCol === "name") { nonZero.sort((a, b) => sortDir === "asc" ? (ENTITIES[a]?.name||"").localeCompare(ENTITIES[b]?.name||"") : (ENTITIES[b]?.name||"").localeCompare(ENTITIES[a]?.name||"")); return nonZero; }
      nonZero.sort((a, b) => { const va = sortCol === "avg" ? getPartyAvg(a) : getRepValue(sortCol, a); const vb = sortCol === "avg" ? getPartyAvg(b) : getRepValue(sortCol, b); return sortDir === "desc" ? vb - va : va - vb; });
      return [...nonZero, ...zeros];
    }
    return sortByFavorability(entities);
  }, [categoryFilter, sortCol, sortDir]);
