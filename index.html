              <div style={{ textAlign: "right" }}><div style={{ fontSize: 10, color: "#6b7d8f", textTransform: "uppercase" }}>Livery</div><div style={{ fontSize: 15, fontWeight: 700, color: netColor(t.livery_net) }}>{t.livery_net >= 0 ? `+${t.livery_net}` : t.livery_net}</div></div>
              <div style={{ textAlign: "right" }}><div style={{ fontSize: 10, color: "#6b7d8f", textTransform: "uppercase" }}>Net</div><div style={{ fontSize: 15, fontWeight: 700, color: netColor(t.total_net) }}>{t.total_net >= 0 ? `+${t.total_net}` : t.total_net}</div></div>
              <div style={{ fontSize: 13, color: t.type === "narrative" ? "#c4b5fd" : "#94a3b8", lineHeight: 1.5 }}>
                {t.type === "narrative" && <span style={{ fontSize: 10, fontWeight: 700, color: "#a78bfa", textTransform: "uppercase", letterSpacing: 1, marginRight: 8 }}>HOOK</span>}
                {t.entry}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ASSET CARDS */}
      <div style={{ fontSize: 21, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", color: "#e2e8f0", marginBottom: 20 }}>Properties</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(380px, 1fr))", gap: 16, marginBottom: 32 }}>
        {ASSETS.map((a) => (
          <div key={a.name} style={{ ...silverBox, padding: 20 }}>
            <div style={{ fontSize: 17, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: "#e2e8f0", marginBottom: 4 }}>{a.name}</div>
            <div style={{ fontSize: 13, color: "#6b7d8f", marginBottom: 4, letterSpacing: 0.5 }}>{a.subtitle}</div>
            <div style={{ fontSize: 11, color: "#5a7a94", textTransform: "uppercase", letterSpacing: 1, marginBottom: 16 }}>{a.phase}</div>
            <div style={{ display: "flex", gap: 24, marginBottom: 16 }}>
              <div>
                <div style={{ fontSize: 11, color: "#6b7d8f", textTransform: "uppercase", letterSpacing: 1 }}>Net / Tenday</div>
                <div style={{ fontSize: 22, fontWeight: 700, color: "#4ade80" }}>{a.tenDayNet}</div>
              </div>
              <div>
                <div style={{ fontSize: 11, color: "#6b7d8f", textTransform: "uppercase", letterSpacing: 1 }}>Net / Month</div>
                <div style={{ fontSize: 22, fontWeight: 700, color: "#4ade80" }}>{a.monthlyNet}</div>
              </div>
            </div>
            {a.streams.map((s) => (
              <div key={s.label} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: "1px solid #222" }}>
                <span style={{ fontSize: 13, color: "#94a3b8" }}>{s.label}</span>
                <span style={{ fontSize: 13, color: "#e2e8f0", fontWeight: 600 }}>{s.net}</span>
              </div>
            ))}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", marginTop: 16, borderTop: "2px solid #7b93a8" }}>
              <div style={{ padding: "12px 0 4px", borderRight: "1px solid #252525" }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: "#7b93a8", textTransform: "uppercase", letterSpacing: 2, marginBottom: 5 }}>Date Opened</div>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#e2e8f0", letterSpacing: 0.5 }}>{a.dateOpened}</div>
              </div>
              <div style={{ padding: "12px 0 4px 16px" }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: "#7b93a8", textTransform: "uppercase", letterSpacing: 2, marginBottom: 5 }}>Days in Business</div>
                <div style={{ fontSize: 22, fontWeight: 700, color: "#7b93a8", letterSpacing: 1 }}>{a.daysOpen}</div>
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* COLLAPSIBLE AGREEMENTS */}
      <div onClick={() => setHoldingsOpen((o) => !o)}
        style={{ display: "flex", alignItems: "center", justifyContent: "space-between", cursor: "pointer", padding: "14px 0", borderTop: "1px solid #252525", borderBottom: holdingsOpen ? "none" : "1px solid #252525", marginBottom: holdingsOpen ? 0 : 32, userSelect: "none" }}
        onMouseEnter={(e) => e.currentTarget.style.opacity = "0.8"}
        onMouseLeave={(e) => e.currentTarget.style.opacity = "1"}>
        <div style={{ fontSize: 21, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", color: "#e2e8f0" }}>Agreements and Assets</div>
        <div style={{ fontSize: 18, color: "#6b7d8f", fontWeight: 700, transition: "transform 0.2s", transform: holdingsOpen ? "rotate(180deg)" : "rotate(0deg)" }}>▾</div>
      </div>
      {holdingsOpen && (
        <div style={{ ...silverBox, marginBottom: 32, maxHeight: 340, overflowY: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ position: "sticky", top: 0, background: "#1a1a1a", zIndex: 2 }}>
                <th style={{ padding: "10px 16px", fontSize: 11, fontWeight: 700, color: "#6b7d8f", textTransform: "uppercase", letterSpacing: 1, textAlign: "left", borderBottom: "1px solid #252525", width: "22%" }}>Name</th>
                <th style={{ padding: "10px 12px", fontSize: 11, fontWeight: 700, color: "#6b7d8f", textTransform: "uppercase", letterSpacing: 1, textAlign: "left", borderBottom: "1px solid #252525", width: "20%" }}>Association</th>
                <th style={{ padding: "10px 12px", fontSize: 11, fontWeight: 700, color: "#6b7d8f", textTransform: "uppercase", letterSpacing: 1, textAlign: "left", borderBottom: "1px solid #252525", width: "13%" }}>Type</th>
                <th style={{ padding: "10px 16px", fontSize: 11, fontWeight: 700, color: "#6b7d8f", textTransform: "uppercase", letterSpacing: 1, textAlign: "left", borderBottom: "1px solid #252525" }}>Details</th>
              </tr>
            </thead>
            <tbody>
              {HOLDINGS.map((h, i) => (
                <tr key={h.name} style={{ borderBottom: i < HOLDINGS.length - 1 ? "1px solid #1f1f1f" : "none" }}>
                  <td style={{ padding: "10px 16px", fontSize: 13, fontWeight: 700, color: "#e2e8f0", textTransform: "uppercase", letterSpacing: 0.5, verticalAlign: "top" }}>{h.name}</td>
                  <td style={{ padding: "10px 12px", fontSize: 12, color: "#7b93a8", textTransform: "uppercase", letterSpacing: 0.5, verticalAlign: "top" }}>{h.assoc}</td>
                  <td style={{ padding: "10px 12px", fontSize: 11, color: "#6b7d8f", textTransform: "uppercase", letterSpacing: 1, verticalAlign: "top", paddingTop: 12 }}>{h.type}</td>
                  <td style={{ padding: "10px 16px", fontSize: 13, color: "#94a3b8", lineHeight: 1.5, verticalAlign: "top" }}>{h.value}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ============================================================
// APP -- FOUR TAB SHELL
// ============================================================
function App() {
  const [mode, setMode] = useState("character");
  const TAB_STYLE = (active) => ({
    ...styles.navBtn(active),
  });
  return (
    <div style={styles.app}>
      <nav style={styles.nav}>
        <div style={styles.navButtons}>
          <button style={TAB_STYLE(mode === "character")} onClick={() => setMode("character")}>Ravens</button>
        </div>
        <div style={styles.navButtons}>
          <button style={TAB_STYLE(mode === "party")} onClick={() => setMode("party")}>Conspiracies</button>
        </div>
        <div style={styles.navButtons}>
          <button style={TAB_STYLE(mode === "reputation")} onClick={() => setMode("reputation")}>Infamy</button>
        </div>
        <div style={styles.navButtons}>
          <button style={TAB_STYLE(mode === "assets")} onClick={() => setMode("assets")}>Holdings</button>
        </div>
      </nav>
      {mode === "character" && <CharacterView />}
      {mode === "party" && <PartyView />}
      {mode === "reputation" && <ReputationView />}
      {mode === "assets" && <AssetsView />}
    </div>
  );
}
ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
